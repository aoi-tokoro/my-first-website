<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✦ FLASHY ✦</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      cursor: none;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      z-index: 0;
    }

    #ui {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
    }

    #title {
      font-size: clamp(3rem, 10vw, 9rem);
      font-weight: 900;
      letter-spacing: 0.2em;
      color: #fff;
      text-transform: uppercase;
      animation: titlePulse 3s ease-in-out infinite;
      position: relative;
    }

    #title::before, #title::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      width: 100%;
    }

    #title::before {
      color: #f0f;
      clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
      animation: glitchTop 2.5s infinite;
    }

    #title::after {
      color: #0ff;
      clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
      animation: glitchBot 2.5s infinite;
    }

    @keyframes glitchTop {
      0%, 90%, 100% { transform: translate(0); }
      91% { transform: translate(-4px, -2px); }
      93% { transform: translate(4px, 2px); }
      95% { transform: translate(-2px, 1px); }
    }

    @keyframes glitchBot {
      0%, 88%, 100% { transform: translate(0); }
      89% { transform: translate(4px, 2px); }
      91% { transform: translate(-4px, -1px); }
      93% { transform: translate(2px, -2px); }
    }

    @keyframes titlePulse {
      0%, 100% { text-shadow: 0 0 20px #fff, 0 0 40px #fff, 0 0 80px #f0f, 0 0 120px #f0f; }
      50% { text-shadow: 0 0 10px #fff, 0 0 20px #0ff, 0 0 60px #0ff, 0 0 100px #0ff; }
    }

    #subtitle {
      margin-top: 1rem;
      font-size: clamp(0.8rem, 2vw, 1.3rem);
      letter-spacing: 0.5em;
      color: rgba(255,255,255,0.6);
      animation: subtitleFade 4s ease-in-out infinite;
      text-transform: uppercase;
    }

    @keyframes subtitleFade {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; color: #0ff; }
    }

    #rings {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      pointer-events: none;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid;
      transform: translate(-50%, -50%);
      animation: ringPulse 3s ease-out infinite;
      opacity: 0;
    }

    .ring:nth-child(1) { width: 200px; height: 200px; border-color: #f0f; animation-delay: 0s; }
    .ring:nth-child(2) { width: 350px; height: 350px; border-color: #0ff; animation-delay: 0.6s; }
    .ring:nth-child(3) { width: 500px; height: 500px; border-color: #ff0; animation-delay: 1.2s; }
    .ring:nth-child(4) { width: 650px; height: 650px; border-color: #f0f; animation-delay: 1.8s; }
    .ring:nth-child(5) { width: 800px; height: 800px; border-color: #0ff; animation-delay: 2.4s; }

    @keyframes ringPulse {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.8; }
      100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
    }

    #cursor {
      position: fixed;
      width: 20px; height: 20px;
      border: 2px solid #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.1s, height 0.1s, background 0.1s;
      mix-blend-mode: difference;
    }

    #cursor-dot {
      position: fixed;
      width: 4px; height: 4px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
    }

    #scanline {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 20;
      animation: scanAnim 8s linear infinite;
    }

    @keyframes scanAnim {
      0% { background-position: 0 0; }
      100% { background-position: 0 100px; }
    }

    #corner-tl, #corner-tr, #corner-bl, #corner-br {
      position: fixed;
      width: 40px; height: 40px;
      z-index: 15;
      pointer-events: none;
    }

    #corner-tl { top: 20px; left: 20px; border-top: 2px solid #0ff; border-left: 2px solid #0ff; }
    #corner-tr { top: 20px; right: 20px; border-top: 2px solid #f0f; border-right: 2px solid #f0f; }
    #corner-bl { bottom: 20px; left: 20px; border-bottom: 2px solid #f0f; border-left: 2px solid #f0f; }
    #corner-br { bottom: 20px; right: 20px; border-bottom: 2px solid #0ff; border-right: 2px solid #0ff; }

    .ticker {
      position: fixed;
      bottom: 60px;
      left: 0;
      width: 100%;
      overflow: hidden;
      z-index: 15;
      pointer-events: none;
    }

    .ticker-inner {
      display: inline-block;
      white-space: nowrap;
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      color: rgba(0,255,255,0.5);
      animation: ticker 25s linear infinite;
      text-transform: uppercase;
    }

    @keyframes ticker {
      0% { transform: translateX(100vw); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div id="rings">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
  </div>

  <div id="ui">
    <div id="title" data-text="FLASHY">FLASHY</div>
    <div id="subtitle">move your mouse &nbsp;·&nbsp; watch it glow</div>
  </div>

  <div id="scanline"></div>
  <div id="corner-tl"></div>
  <div id="corner-tr"></div>
  <div id="corner-bl"></div>
  <div id="corner-br"></div>
  <div id="cursor"></div>
  <div id="cursor-dot"></div>

  <div class="ticker">
    <span class="ticker-inner">
      ✦ PARTICLES ✦ NEON ✦ GLITCH ✦ WAVES ✦ PLASMA ✦ VORTEX ✦ HYPERSPACE ✦ ELECTRIC ✦ CYBER ✦ FLUX ✦ RADIANCE ✦ PULSE ✦ AURORA ✦ SPECTRUM ✦ IGNITE ✦ BLAZE ✦ SURGE ✦ FLASHY ✦
    </span>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const cursor = document.getElementById('cursor');
    const cursorDot = document.getElementById('cursor-dot');

    let W = canvas.width = window.innerWidth;
    let H = canvas.height = window.innerHeight;
    let mouse = { x: W / 2, y: H / 2, px: W / 2, py: H / 2 };
    let hue = 0;
    let frame = 0;
    let trails = [];

    window.addEventListener('resize', () => {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    });

    window.addEventListener('mousemove', (e) => {
      mouse.px = mouse.x;
      mouse.py = mouse.y;
      mouse.x = e.clientX;
      mouse.y = e.clientY;

      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
      cursorDot.style.left = e.clientX + 'px';
      cursorDot.style.top = e.clientY + 'px';

      trails.push({
        x: e.clientX, y: e.clientY,
        r: Math.random() * 8 + 4,
        life: 1,
        hue: hue,
        vx: (Math.random() - 0.5) * 2,
        vy: (Math.random() - 0.5) * 2 - 1
      });

      spawnBurst(e.clientX, e.clientY, 3);
    });

    // ---- Particles ----
    const PARTICLE_COUNT = 180;
    const particles = [];

    class Particle {
      constructor() { this.reset(true); }
      reset(init = false) {
        this.x = Math.random() * W;
        this.y = init ? Math.random() * H : H + 10;
        this.baseX = this.x;
        this.r = Math.random() * 2 + 0.5;
        this.speed = Math.random() * 0.6 + 0.2;
        this.hue = Math.random() * 360;
        this.driftX = (Math.random() - 0.5) * 0.5;
        this.alpha = Math.random() * 0.8 + 0.2;
        this.wobble = Math.random() * Math.PI * 2;
        this.wobbleSpeed = (Math.random() - 0.5) * 0.03;
      }
      update() {
        this.y -= this.speed;
        this.wobble += this.wobbleSpeed;
        this.x = this.baseX + Math.sin(this.wobble) * 20;
        this.hue = (this.hue + 0.5) % 360;

        // mouse attraction
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          this.x += dx * 0.015;
          this.y += dy * 0.015;
        }

        if (this.y < -10) this.reset();
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue},100%,70%,${this.alpha})`;
        ctx.shadowColor = `hsl(${this.hue},100%,70%)`;
        ctx.shadowBlur = 8;
        ctx.fill();
      }
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

    // ---- Burst particles ----
    const bursts = [];
    function spawnBurst(x, y, n) {
      for (let i = 0; i < n; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 1;
        bursts.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: Math.random() * 3 + 1,
          life: 1,
          hue: hue
        });
      }
    }

    // ---- Plasma background ----
    let offscreen = null;
    let offCtx = null;

    function drawPlasma(t) {
      if (!offscreen) {
        offscreen = new OffscreenCanvas(W, H);
        offCtx = offscreen.getContext('2d');
      }

      const step = 8;
      for (let x = 0; x < W; x += step) {
        for (let y = 0; y < H; y += step) {
          const v =
            Math.sin(x / 80 + t * 0.5) +
            Math.sin(y / 80 + t * 0.4) +
            Math.sin((x + y) / 120 + t * 0.3) +
            Math.sin(Math.sqrt((x - W/2)**2 + (y - H/2)**2) / 60 + t * 0.6);
          const h = (v * 60 + t * 40) % 360;
          offCtx.fillStyle = `hsla(${h},100%,50%,0.04)`;
          offCtx.fillRect(x, y, step, step);
        }
      }
      ctx.drawImage(offscreen, 0, 0);
    }

    // ---- Wave lines ----
    function drawWaves(t) {
      const lineCount = 6;
      for (let l = 0; l < lineCount; l++) {
        const waveHue = (hue + l * 60) % 360;
        ctx.beginPath();
        ctx.strokeStyle = `hsla(${waveHue},100%,60%,0.3)`;
        ctx.lineWidth = 1.5;
        ctx.shadowColor = `hsl(${waveHue},100%,60%)`;
        ctx.shadowBlur = 10;
        for (let x = 0; x <= W; x += 4) {
          const mdx = (x - mouse.x) / W;
          const y = H / 2
            + Math.sin(x / 120 + t * (0.5 + l * 0.1) + l * 1.2) * (60 + l * 15)
            + Math.sin(x / 60 + t * 0.8) * 20
            + mdx * (mouse.y - H/2) * 0.4;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    }

    // ---- Main loop ----
    function loop(ts) {
      requestAnimationFrame(loop);
      frame++;
      hue = (hue + 0.5) % 360;
      const t = ts * 0.001;

      // fade trail
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.fillRect(0, 0, W, H);

      // plasma
      if (frame % 3 === 0) drawPlasma(t);

      // waves
      ctx.shadowBlur = 0;
      drawWaves(t);

      // mouse glow
      const grd = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 160);
      grd.addColorStop(0, `hsla(${hue},100%,70%,0.18)`);
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, W, H);

      // trails
      for (let i = trails.length - 1; i >= 0; i--) {
        const tr = trails[i];
        tr.life -= 0.04;
        tr.x += tr.vx;
        tr.y += tr.vy;
        tr.vy += 0.05;
        if (tr.life <= 0) { trails.splice(i, 1); continue; }
        ctx.beginPath();
        ctx.arc(tr.x, tr.y, tr.r * tr.life, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${tr.hue},100%,70%,${tr.life * 0.7})`;
        ctx.shadowColor = `hsl(${tr.hue},100%,70%)`;
        ctx.shadowBlur = 15;
        ctx.fill();
      }

      // burst particles
      for (let i = bursts.length - 1; i >= 0; i--) {
        const b = bursts[i];
        b.life -= 0.025;
        b.x += b.vx;
        b.y += b.vy;
        b.vy += 0.1;
        b.vx *= 0.98;
        if (b.life <= 0) { bursts.splice(i, 1); continue; }
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r * b.life, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${b.hue},100%,70%,${b.life})`;
        ctx.shadowColor = `hsl(${b.hue},100%,60%)`;
        ctx.shadowBlur = 12;
        ctx.fill();
      }

      // floating particles
      ctx.shadowBlur = 0;
      for (const p of particles) { p.update(); p.draw(); }

      ctx.shadowBlur = 0;
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
